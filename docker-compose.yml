volumes:
  piwigo:
  piwigo-scripts:
  db:

networks:
  piwigo:
  REVERSE_PROXY:
    external: true

services:
  piwigo:
    image: piwigo/piwigo:${PIWIGO_VERSION:-latest}
    hostname: piwigo
    container_name: piwigo
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT}.rule=Host(`${PROJECT_FQDN}`)"
      - "traefik.http.routers.${PROJECT}.entrypoints=${PROJECT_ENTRYPOINT}"
      - "traefik.http.routers.${PROJECT}.tls.certresolver=${PROJECT_CERT_RESOLVER}"
    restart: always
    environment:
      - TZ=${TZ:-Europe/Amsterdam}
    networks:
      - piwigo
      - REVERSE_PROXY
    ports:
      - '${PROJECT_IP:-0.0.0.0}:${PROJECT_PORT:-80}:80'
    depends_on:
      - piwigo.db
    volumes:
      - piwigo:/var/www/html/piwigo/
      - piwigo-scripts:/usr/local/bin/scripts/

  piwigo.db:
    image: mariadb:${MARIADB_VERSION:-lts}
    hostname: db
    container_name: piwigo.db
    restart: always
    environment:
      - MARIADB_RANDOM_ROOT_PASSWORD=${MARIADB_RANDOM_ROOT_PASSWORD:-true}
      - MARIADB_USER=${MARIADB_USER:-piwigodb_user}
      - MARIADB_DATABASE=${MARIADB_DATABASE:-piwigodb}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD} 
      - TZ=${TZ:-Europe/Amsterdam}
    networks:
      - piwigo
    volumes:
      - db:/var/lib/mysql
